# Build QalKulator for Windows via MSYS2 (UCRT64) and attach a portable zip + NSIS
# installer to the same v<version> release created by release.yml. Independent of
# the Linux pipeline — a Windows failure never affects the Linux release.
name: windows

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # version.sh counts commits

      - name: Compute version
        id: v
        shell: bash               # git-bash; MSYS2 not up yet
        run: echo "version=$(./version.sh)" >> "$GITHUB_OUTPUT"

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-extra-cmake-modules
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-declarative
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-kirigami
            mingw-w64-ucrt-x86_64-kcoreaddons
            mingw-w64-ucrt-x86_64-kconfig
            mingw-w64-ucrt-x86_64-ki18n
            mingw-w64-ucrt-x86_64-kcrash
            mingw-w64-ucrt-x86_64-breeze-icons
            mingw-w64-ucrt-x86_64-qqc2-desktop-style
            mingw-w64-ucrt-x86_64-sonnet
            mingw-w64-ucrt-x86_64-libqalculate
            mingw-w64-ucrt-x86_64-nsis

      - name: Build + deploy + package
        run: ./packaging/windows/deploy-windows.sh "${{ steps.v.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            QalKulator-*-windows-x86_64.zip
            QalKulator-*-Setup.exe

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          fail_on_unmatched_files: false
          files: |
            QalKulator-*-windows-x86_64.zip
            QalKulator-*-Setup.exe
