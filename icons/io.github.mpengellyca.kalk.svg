<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="24" y1="3" x2="24" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4b5563"/>
      <stop offset="1" stop-color="#2b303b"/>
    </linearGradient>
    <linearGradient id="screen" x1="24" y1="8" x2="24" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b1e26"/>
      <stop offset="1" stop-color="#12141a"/>
    </linearGradient>
  </defs>

  <!-- device body -->
  <rect x="6" y="3" width="36" height="42" rx="6" fill="url(#body)"/>
  <rect x="6" y="3" width="36" height="42" rx="6" fill="none" stroke="#0e1014" stroke-opacity="0.5"/>

  <!-- display -->
  <rect x="10" y="7" width="28" height="11" rx="2.5" fill="url(#screen)"/>
  <text x="34.5" y="15.6" text-anchor="end" font-family="'DejaVu Sans Mono',monospace"
        font-size="7.2" font-weight="700" fill="#3daee9">42</text>

  <!-- keypad -->
  <g fill="#e6e9ef">
    <rect x="10" y="22" width="6" height="5" rx="1.4"/>
    <rect x="19" y="22" width="6" height="5" rx="1.4"/>
    <rect x="28" y="22" width="6" height="5" rx="1.4"/>

    <rect x="10" y="30" width="6" height="5" rx="1.4"/>
    <rect x="19" y="30" width="6" height="5" rx="1.4"/>
    <rect x="28" y="30" width="6" height="5" rx="1.4"/>

    <rect x="10" y="38" width="6" height="5" rx="1.4"/>
    <rect x="19" y="38" width="6" height="5" rx="1.4"/>
  </g>

  <!-- accent equals key -->
  <rect x="28" y="38" width="6" height="5" rx="1.4" fill="#3daee9"/>
</svg>
